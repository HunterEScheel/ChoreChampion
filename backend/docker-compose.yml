services:
  db:
    image: postgres:16
    container_name: chorechampion-db
    environment:
      POSTGRES_USER: chorechampion
      POSTGRES_PASSWORD: chorechampion
      POSTGRES_DB: chorechampion
    ports:
      - "5433:5432"
    volumes:
      - chorechampion_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorechampion -d chorechampion"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chorechampion_pg:
